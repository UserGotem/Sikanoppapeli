<!DOCTYPE html>
<html lang="fi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <link rel="stylesheet" href="styles.css" />
    <title>Sikanoppapeli</title>
  </head>
  <body>
    <main>
      <section class="player player-0 player-active">
        <h2 class="name" id="name-0">
          Pelaaja1 <i class="edit-icon" onclick="renamePlayer(0)">📌</i>
        </h2>
        <p class="score" id="score-0"></p>
        <div class="current">
          <p class="current-label">Pistemäärä</p>
          <p class="current-score" id="current-0">0</p>
        </div>
      </section>
      <section class="player player-1">
        <h2 class="name" id="name-1">
          Pelaaja2 <i class="edit-icon" onclick="renamePlayer(1)">📌</i>
        </h2>
        <p class="score" id="score-1"></p>
        <div class="current">
          <p class="current-label">Pistemäärä</p>
          <p class="current-score" id="current-1">0</p>
        </div>
      </section>

      <img src="dice5.png" alt="Playing dice" class="dice" />
      <button class="btn btn--new">🔄 Uusi peli</button>
      <button class="btn btn--roll">🎲 Heitä noppaa</button>
      <button class="btn btn--hold">🔛 Anna vuoro</button>
    </main>
    <script src="script.js"></script>
  </body>
</html>
